    :root {

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {

      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image:

        linear-gradient(90deg, rgba(77,201,212,0.02) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events:none;
    }

    #graph-container { position:fixed; inset:0; z-index:2; }
    #graph-container::after {
      content:''; position:fixed; inset:0; z-index:1;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(10,10,20,0.5) 100%);

    #header .sub { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; }
    #header .stats { font-size:11px; color:var(--text-dim); margin-top:4px; }
    #header .stats span { color:var(--accent); }

    #search-box { position:absolute; top:16px; right:20px; width:260px; }
    #search-input {
      width:100%; padding:8px 12px 8px 32px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); color:var(--text);
      font-family:var(--font-mono); font-size:12px; outline:none;
      transition: border-color var(--tr);
    }
    #search-input:focus { border-color:var(--accent); }
    #search-input::placeholder { color:var(--text-muted); }
    .search-icon { position:absolute; top:9px; left:10px; color:var(--text-muted); pointer-events:none; }
    #search-results {
      margin-top:4px; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); max-height:280px; overflow-y:auto; display:none;
    }
    #search-results.open { display:block; }
    .sr-item {
      padding:6px 12px; cursor:pointer; border-bottom:1px solid var(--border);
      font-size:12px; display:flex; align-items:center; gap:8px; transition: background var(--tr);
    }
    .sr-item:hover { background:var(--surface-2); }
    .sr-item:last-child { border-bottom:none; }
    .sr-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .sr-type { font-size:9px; opacity:0.4; text-transform:uppercase; margin-left:auto; }

    #filters {
      position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
      display:flex; gap:5px; flex-wrap:wrap; justify-content:center;
    }
    #filters::before {
      content:''; position:absolute; bottom:100%; left:0; right:0; height:40px;
      background: linear-gradient(to top, var(--bg), transparent);
      pointer-events:none;
    }
    .pill {
      padding:4px 10px; background:var(--surface);
      border:1px solid var(--border); border-radius:16px;
      font-size:10px; color:var(--text-dim); cursor:pointer;
      display:flex; align-items:center; gap:5px;
      transition: all var(--tr); user-select:none;
    }
    .pill.on { border-color:var(--accent); color:var(--text); background:rgba(77,201,212,0.06); }
    .pill:hover { border-color:rgba(77,201,212,0.3); }
    .pill .dot { width:7px; height:7px; border-radius:50%; }

    #info {
      position:absolute; top:0; right:0; width:340px; height:100%;
      background:rgba(30,30,46,0.96); border-left:1px solid var(--border);
      transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
      padding:20px; overflow-y:auto;
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    }
    #info.open { transform:translateX(0); }
    #info .close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; }
    #info .close:hover { color:var(--accent); }

    #info .desc { font-size:12px; color:var(--text-dim); line-height:1.6; margin-bottom:16px; }
    #info .conn-title { font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:6px; }
    .conn-item {

      font-size:11px; display:flex; align-items:center; gap:6px;
      background:rgba(77,201,212,0.03); transition:background var(--tr);

    .conn-rel { opacity:0.3; font-size:9px; margin-left:auto; }

      display:inline-block; margin-top:12px; padding:5px 10px;
      background:rgba(77,201,212,0.08); border:1px solid var(--border);
      border-radius:var(--radius); color:var(--accent); font-size:11px;
      text-decoration:none; transition:all var(--tr);
    }
    .vault-link:hover { background:rgba(77,201,212,0.15); }

    #controls { position:absolute; top:70px; left:20px; display:flex; flex-direction:column; gap:6px; }
    .cbtn {
      width:32px; height:32px; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text-dim); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; transition:all var(--tr);
    }
    .cbtn:hover { border-color:var(--accent); color:var(--accent); }
    .cbtn.on { background:rgba(77,201,212,0.08); border-color:var(--accent); color:var(--accent); }

    #nav-back {
      position:absolute; top:16px; left:50%; transform:translateX(-50%);
      padding:5px 14px; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); color:var(--text-dim); cursor:pointer;
      font-family:var(--font-mono); font-size:11px;

    #nav-back.show { display:flex; }
    #nav-back:hover { border-color:var(--accent); color:var(--accent); }

    #tip {
      position:fixed; padding:4px 10px; background:var(--surface);
      border:1px solid var(--accent); border-radius:5px;
      font-size:10px; color:var(--accent); pointer-events:none;
      opacity:0; transition:opacity 0.12s; z-index:100; white-space:nowrap;
    }
    #tip.on { opacity:1; }

    #legend {
      position:absolute; bottom:50px; right:20px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:10px 14px;

    .leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    #loading {
      position:fixed; inset:0; z-index:999; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
      transition:opacity 0.5s;
    }
    #loading.done { opacity:0; pointer-events:none; }
    #loading h2 { font-family:var(--font-head); font-size:16px; color:var(--accent); }
    .spin { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:sp 0.7s linear infinite; }
    @keyframes sp { to { transform:rotate(360deg); } }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    @media (max-width:768px) {
      #info { width:100%; }
      #legend { display:none; }
      #search-box { width:180px; }
    }
  </style>
</head>

//  DETERMINISTIC LAYOUT — fixed positions, no simulation jitter
//  3 week hubs at 120° apart, nodes in concentric rings
// ══════════════════════════════════════════════════
const WR = 75; // week hub radius from center
// Weeks on XY plane — camera looks from Z axis
const weekCenters = {
  w1: { x: -WR,        y: 0, z: 0 },
  w2: { x: WR * 0.5,   y: WR * 0.866, z: 0 },
  w3: { x: WR * 0.5,   y: -WR * 0.866, z: 0 },
};

// Find which week(s) each node connects to
function nodeWeeks(nid) {
  const weeks = [];
  graphData.links.forEach(l => {
    const s = l.source, t = l.target;
    if (s === nid && ['w1','w2','w3'].includes(t)) weeks.push(t);
    if (t === nid && ['w1','w2','w3'].includes(s)) weeks.push(s);
  });
  return [...new Set(weeks)];
}

// Find indirect week via neighbors
function indirectWeek(nid) {
  for (const l of graphData.links) {
    const other = l.source === nid ? l.target : (l.target === nid ? l.source : null);
    if (!other) continue;
    const ws = nodeWeeks(other);
    if (ws.length) return ws[0];
  }
  return null;
}

// Place nodes in ring on XY plane around center
function ringPos(cx, cy, cz, radius, index, total) {
  const angle = (index / Math.max(total, 1)) * Math.PI * 2;
  return {
    x: cx + Math.cos(angle) * radius,
    y: cy + Math.sin(angle) * radius,
    z: (Math.random() - 0.5) * 6 // slight depth
  };
}

// Assign and position all nodes
const weekNodes = { w1: { sessions:[], speakers:[], curators:[], topics:[], concepts:[], other:[] },
                    w2: { sessions:[], speakers:[], curators:[], topics:[], concepts:[], other:[] },
                    w3: { sessions:[], speakers:[], curators:[], topics:[], concepts:[] , other:[] } };
const sharedNodes = [];

graphData.nodes.forEach(n => {
  if (['w1','w2','w3'].includes(n.id)) return; // weeks positioned directly
  const ws = nodeWeeks(n.id);
  const week = ws[0] || indirectWeek(n.id);
  if (week && weekNodes[week]) {
    const bucket = n.type === 'session' ? 'sessions' : n.type === 'speaker' ? 'speakers' :
                   n.type === 'curator' ? 'curators' : n.type === 'topic' ? 'topics' :
                   n.type === 'concept' ? 'concepts' : 'other';
    weekNodes[week][bucket].push(n);
  } else {
    sharedNodes.push(n);
  }
});

// Position week hubs
['w1','w2','w3'].forEach(wid => {
  const n = graphData.nodes.find(x => x.id === wid);
  const c = weekCenters[wid];
  n.fx = c.x; n.fy = c.y; n.fz = c.z;
});

// Position nodes in rings around each week
Object.entries(weekNodes).forEach(([wid, buckets]) => {
  const c = weekCenters[wid];
  // Ring 1: sessions (r=18)
  buckets.sessions.forEach((n,i) => { const p = ringPos(c.x,c.y,c.z, 18, i, buckets.sessions.length); n.fx=p.x; n.fy=p.y; n.fz=p.z; });
  // Ring 2: speakers (r=32)
  buckets.speakers.forEach((n,i) => { const p = ringPos(c.x,c.y,c.z, 32, i, buckets.speakers.length); n.fx=p.x; n.fy=p.y; n.fz=p.z; });
  // Ring 2b: curators (r=40, offset angle)
  buckets.curators.forEach((n,i) => { const p = ringPos(c.x,c.y,c.z, 40, i+0.3, Math.max(buckets.curators.length,1)); n.fx=p.x; n.fy=p.y; n.fz=p.z; });
  // Ring 3: topics (r=48)
  buckets.topics.forEach((n,i) => { const p = ringPos(c.x,c.y,c.z, 48, i, buckets.topics.length); n.fx=p.x; n.fy=p.y; n.fz=p.z; });
  // Ring 4: concepts (r=58)
  buckets.concepts.forEach((n,i) => { const p = ringPos(c.x,c.y-2,c.z, 58, i, buckets.concepts.length); n.fx=p.x; n.fy=p.y; n.fz=p.z; });
  // Other (r=42)
  buckets.other.forEach((n,i) => { const p = ringPos(c.x,c.y+5,c.z, 42, i, Math.max(buckets.other.length,1)); n.fx=p.x; n.fy=p.y; n.fz=p.z; });
});

// Shared nodes — center area
sharedNodes.forEach((n,i) => {
  const p = ringPos(0, 8, 0, 20, i, Math.max(sharedNodes.length,1));
  n.fx = p.x; n.fy = p.y; n.fz = p.z;
});

`;

`;

    const sz = t.size || 4;
    const isPerson = ['speaker','curator','team','participant'].includes(n.type);

    if (n.type === 'week') {
      // WEEK — octahedron hub
      const geo = new THREE.OctahedronGeometry(sz*0.5, 1);

      const ringMat = new THREE.MeshBasicMaterial({ color, side:THREE.DoubleSide, transparent:true, opacity:0.7 });
      group.add(new THREE.Mesh(ringGeo, ringMat));
      // Sync fallback first (visible immediately), then async load avatar over it
      const fallbackGeo = new THREE.SphereGeometry(sz*0.45, 12, 12);
      const fallbackMat = new THREE.MeshPhongMaterial({ color, emissive:color, emissiveIntensity:0.3, transparent:true, opacity:0.7 });
      const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
      group.add(fallbackMesh);
      // Async load avatar texture
      new THREE.TextureLoader().load(n.avatar,
        tex => {
          // Success — replace fallback with photo sprite
          group.remove(fallbackMesh);
          const spMat2 = new THREE.SpriteMaterial({ map:tex });
          const sp2 = new THREE.Sprite(spMat2);
          sp2.scale.set(sz*1.1, sz*1.1, 1);
          group.add(sp2);

    } else if (isPerson) {

      const geo = new THREE.BoxGeometry(sz*1.0, sz*1.0, sz*0.3, 2, 2, 2);
      const mat = new THREE.MeshPhongMaterial({ color, emissive:color, emissiveIntensity:0.35, shininess:50, transparent:true, opacity:0.88 });

      lbl.position.y = sz * 0.6 + 2;
      group.add(lbl);

    n.__group = group;

// Glow texture
const _gtc = {};
function glowTex(hex) {
  if (_gtc[hex]) return _gtc[hex];
  const c = document.createElement('canvas'); c.width=128; c.height=128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,hex+'cc'); g.addColorStop(0.3,hex+'40'); g.addColorStop(0.7,hex+'10'); g.addColorStop(1,hex+'00');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  return (_gtc[hex] = new THREE.CanvasTexture(c));
}

const PC = 600, SPREAD = 350;
const pPos = new Float32Array(PC*3), pRand = new Float32Array(PC);
for (let i=0;i<PC;i++){pPos[i*3]=(Math.random()-0.5)*SPREAD;pPos[i*3+1]=(Math.random()-0.5)*SPREAD;pPos[i*3+2]=(Math.random()-0.5)*SPREAD;pRand[i]=Math.random();}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('aRand', new THREE.BufferAttribute(pRand,1));
const pUni = {uTime:{value:0},uSize:{value:1.8},uColor:{value:new THREE.Color('#4dc9d4')}};
const pMat = new THREE.ShaderMaterial({uniforms:pUni,vertexShader:PARTICLE_VS,fragmentShader:PARTICLE_FS,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
const particles = new THREE.Points(pGeo,pMat);
scene.add(particles);
// Animate particles
let pTime = 0;
(function animP(){requestAnimationFrame(animP);pTime+=0.0003;pUni.uTime.value=pTime*1000;})();

// ══════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════
const fuse = new Fuse(graphData.nodes, { keys:['name','description','type'], threshold:0.35, includeScore:true });
const searchIn = document.getElementById('search-input');
const searchRes = document.getElementById('search-results');

searchIn.addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) { searchRes.classList.remove('open'); searchRes.innerHTML=''; resetHL(); return; }
  const res = fuse.search(q).slice(0,8);
  if (!res.length) { searchRes.classList.remove('open'); return; }
  searchRes.classList.add('open');
  searchRes.innerHTML = res.map(r => {
    const c = TYPES[r.item.type]?.color||'#64748b';
    return `<div class="sr-item" data-id="${r.item.id}"><span class="sr-dot" style="background:${c}"></span>${r.item.name}<span class="sr-type">${r.item.type}</span></div>`;
  }).join('');
  searchRes.querySelectorAll('.sr-item').forEach(el => {
    el.onclick = () => { const nd=graphData.nodes.find(n=>n.id===el.dataset.id); if(nd){onClick(nd);searchIn.value='';searchRes.classList.remove('open');} };
  });
});

document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); searchIn.focus(); }
  if (e.key==='Escape') { searchIn.blur(); searchIn.value=''; searchRes.classList.remove('open'); closeInfo(); resetHL(); }
  if (document.activeElement===searchIn) return;
  if (e.key==='f'||e.key==='F') { if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); }
  if (e.key==='r'||e.key==='R') resetCam();
  if (e.key==='l'||e.key==='L') toggleLabels();
  if (e.key==='Backspace') goBack();
});

// ══════════════════════════════════════════════════
//  INTERACTION
// ══════════════════════════════════════════════════
let hovered=null, selected=null;
const tip = document.getElementById('tip');

function onHover(node) {
  container.style.cursor = node?'pointer':'default';
  // Reset previous hover
  if (hovered) {
    if (hovered.__halo) hovered.__halo.material.opacity = hovered.type==='week' ? 0.3 : 0.2;
  }
  hovered=node;
  if (node) {
    // Highlight on hover
    if (node.__halo) node.__halo.material.opacity = node.type==='week' ? 0.6 : 0.5;
    // Show tooltip with type info
    const t = TYPES[node.type];
    tip.textContent = `${t?.icon||''} ${node.name}`;
    tip.classList.add('on');
  } else {
    tip.classList.remove('on');
  }
}
document.addEventListener('pointermove', e => { tip.style.left=(e.clientX+10)+'px'; tip.style.top=(e.clientY-6)+'px'; });

function onClick(node) {
  if (selected) navHistory.push(selected);
  selected=node;
  updateBack();
  showInfo(node);
  highlightConnected(node);
  // Zoom distance depends on node type — weeks show cluster, others go close
  const dist = node.type==='week' ? 100 : (TYPES[node.type]?.size||5) * 8;
  const elevate = node.type==='week' ? 40 : 15;
  Graph.cameraPosition(
    {x:node.x+dist*0.7, y:node.y+elevate, z:node.z+dist*0.7},
    {x:node.x, y:node.y, z:node.z},
    node.type==='week' ? 1200 : 800
  );
}

function onBgClick() { selected=null; closeInfo(); resetHL(); navHistory.length=0; updateBack(); }

function goBack() {
  if (!navHistory.length) return;
  const prev=navHistory.pop(); selected=prev; updateBack();
  showInfo(prev); highlightConnected(prev);
  Graph.cameraPosition({x:prev.x+50,y:prev.y+20,z:prev.z+50},{x:prev.x,y:prev.y,z:prev.z},600);
}
function updateBack() { document.getElementById('nav-back').classList.toggle('show',navHistory.length>0); }
document.getElementById('nav-back').onclick = goBack;

function highlightConnected(node) {
  const conn=new Set([node.id]);
  graphData.links.forEach(l => {
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    if(s===node.id)conn.add(t); if(t===node.id)conn.add(s);
  });
  graphData.nodes.forEach(n => {
    const yes = conn.has(n.id);
    const isSelf = n.id === node.id;
    // Dim non-connected, brighten connected
    if (n.__group) n.__group.children.forEach(c => {
      if (c.material && c.material.opacity !== undefined)
        c.material.opacity = yes ? (isSelf ? 0.95 : 0.85) : 0.04;
    });
    // Halo: strong on selected, medium on connected, hidden on rest
    if (n.__halo) n.__halo.material.opacity = yes ? (isSelf ? 0.6 : 0.3) : 0.01;
    // Labels: always show connected nodes' labels during highlight
    if (n.__label) n.__label.visible = yes;
  });
}

function resetHL() {
  graphData.nodes.forEach(n => {
    if (n.__group) n.__group.children.forEach(c => {
      if (c.material && c.material.opacity !== undefined)
        c.material.opacity = n.type === 'week' ? 0.9 : 0.87;
    });
    if (n.__halo) n.__halo.material.opacity = n.type === 'week' ? 0.3 : 0.2;
    if (n.__label) n.__label.visible = showLabels;
  });
}

// ══════════════════════════════════════════════════
//  INFO PANEL
// ══════════════════════════════════════════════════
const infoEl=document.getElementById('info');
const infoBody=document.getElementById('info-body');

function showInfo(node) {
  const t=TYPES[node.type]||{};
  const color=t.color||'#64748b';
  const conns=[];
  graphData.links.forEach(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const tt=typeof l.target==='object'?l.target.id:l.target;
    if(s===node.id){const n2=graphData.nodes.find(n=>n.id===tt);if(n2)conns.push({node:n2,rel:l.type,dir:'→'});}
    if(tt===node.id){const n2=graphData.nodes.find(n=>n.id===s);if(n2)conns.push({node:n2,rel:l.type,dir:'←'});}
  });
  // Telegram link for person nodes
  const isPerson = ['participant','speaker','curator','team'].includes(node.type);
  const tgMatch = isPerson ? node.description?.match(/@(\w+)/) : null;
  const tgLink = tgMatch ? `<a class="vault-link" href="https://t.me/${tgMatch[1]}" target="_blank" style="margin-right:8px">@${tgMatch[1]} in Telegram</a>` : '';
  // Obsidian link for nodes with path property
  const obsLink = node.path ? `<a class="vault-link" href="obsidian://open?vault=notes&file=${encodeURIComponent(node.path)}" target="_blank">Open in Obsidian</a>` : '';
  infoBody.innerHTML=`
    <span class="badge" style="background:${color}18;color:${color};border:1px solid ${color}30">${t.icon||''} ${t.label||node.type}</span>
    <h2>${node.name}</h2>
    <div class="desc">${node.description||''}</div>
    ${(tgLink||obsLink)?`<div style="margin-top:10px">${tgLink}${obsLink}</div>`:''}
    ${conns.length?`<div class="conn-title">Connections (${conns.length})</div>
    ${conns.map(c=>`<div class="conn-item" data-id="${c.node.id}"><span class="conn-dot" style="background:${TYPES[c.node.type]?.color||'#64748b'}"></span>${c.dir} ${c.node.name}<span class="conn-rel">${c.rel}</span></div>`).join('')}`:''}
  `;
  infoBody.querySelectorAll('.conn-item').forEach(el=>{el.onclick=()=>{const nd=graphData.nodes.find(n=>n.id===el.dataset.id);if(nd)onClick(nd);};});
  infoEl.classList.add('open');
}
function closeInfo(){infoEl.classList.remove('open');}
document.getElementById('info-close').onclick=()=>{closeInfo();resetHL();selected=null;};

// ══════════════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════════════
const filtersEl=document.getElementById('filters');
const activeTypes=new Set(Object.keys(TYPES));

Object.entries(TYPES).forEach(([type,cfg])=>{
  const count=graphData.nodes.filter(n=>n.type===type).length;
  if(!count)return;
  const p=document.createElement('div');
  p.className='pill on'; p.dataset.type=type;
  p.innerHTML=`<span class="dot" style="background:${cfg.color}"></span>${cfg.label} (${count})`;
  p.onclick=()=>{
    if(activeTypes.has(type)){activeTypes.delete(type);p.classList.remove('on');}
    else{activeTypes.add(type);p.classList.add('on');}
    applyFilters();
  };
  filtersEl.appendChild(p);
});

function applyFilters(){
  const nodes=graphData.nodes.filter(n=>activeTypes.has(n.type));
  const ids=new Set(nodes.map(n=>n.id));
  const links=graphData.links.filter(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return ids.has(s)&&ids.has(t);
  });
  Graph.graphData({nodes,links});
  updateStats(nodes,links);
}

// Legend
const legItems=document.getElementById('leg-items');
Object.entries(TYPES).forEach(([type,cfg])=>{
  const count=graphData.nodes.filter(n=>n.type===type).length;
  if(!count)return;
  const d=document.createElement('div'); d.className='leg-item';
  d.innerHTML=`<span class="leg-dot" style="background:${cfg.color}"></span>${cfg.icon} ${cfg.label}`;
  legItems.appendChild(d);
});

// Controls
function resetCam(){Graph.cameraPosition({x:0,y:0,z:250},{x:0,y:0,z:0},800);resetHL();closeInfo();selected=null;navHistory.length=0;updateBack();}
function toggleLabels(){showLabels=!showLabels;document.getElementById('btn-labels').classList.toggle('on',showLabels);graphData.nodes.forEach(n=>{if(n.__label)n.__label.visible=showLabels;});}
document.getElementById('btn-reset').onclick=resetCam;
document.getElementById('btn-labels').onclick=toggleLabels;
document.getElementById('btn-fullscreen').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen();};

// Stats
function updateStats(nodes,links){
  document.getElementById('s-nodes').textContent=(nodes||graphData.nodes).length;
  document.getElementById('s-links').textContent=(links||graphData.links).length;
  document.getElementById('s-types').textContent=new Set((nodes||graphData.nodes).map(n=>n.type)).size;
}
updateStats();

Graph.cameraPosition({x:0, y:0, z:250});
setTimeout(()=>{document.getElementById('loading').classList.add('done');setTimeout(()=>document.getElementById('loading').remove(),500);},1200);
new ResizeObserver(()=>{Graph.width(window.innerWidth);Graph.height(window.innerHeight);}).observe(document.body);

})();
</script>
</body>
</html>
